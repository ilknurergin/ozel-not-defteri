<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Mistik Ajanda</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'serif'; background: #000; color: white; overflow: hidden; }
        #login-screen { position: fixed; width: 100%; height: 100%; background: url('1000093933.jpg') no-repeat center center; background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: 0.8s; }
        .fingerprint-btn { width: 130px; height: 130px; background: url('1000093911.jpg') no-repeat center center; background-size: contain; border: none; cursor: pointer; border-radius: 50%; box-shadow: 0 0 20px #00d4ff; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1100; backdrop-filter: blur(15px); }
        .pin-display { font-size: 35px; color: #00d4ff; margin-bottom: 20px; letter-spacing: 10px; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; }
        .pin-btn { width: 70px; height: 70px; border-radius: 50%; border: 1px solid #444; background: rgba(255,255,255,0.05); color: white; font-size: 20px; cursor: pointer; }
        
        #app-content { display: none; padding: 15px; height: 100vh; overflow-y: auto; background: #080808; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .day-container { margin-bottom: 8px; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .day-header { padding: 15px; background: rgba(20,20,20,0.8); cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .day-content { display: none; padding: 15px; min-height: 400px; background-size: cover; background-position: center; }
        
        /* GÜN RESİMLERİ */
        .pazartesi { background-image: url('1000093927.jpg'); }
        .sali { background-image: url('1000093922.jpg'); }
        .carsamba { background-image: url('1000093921.jpg'); }
        .persembe { background-image: url('1000093920.jpg'); }
        .cuma { background-image: url('1000093919.jpg'); }
        .cumartesi { background-image: url('1000093918.jpg'); }
        .pazar { background-image: url('1000093916.jpg'); }

        textarea { width: 100%; height: 200px; background: rgba(0,0,0,0.7); color: white; border: 1px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; }
        .mood-selector { margin: 10px 0; display: flex; gap: 10px; justify-content: center; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 20px; }
        .mood-btn { font-size: 20px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .mood-btn.active { opacity: 1; transform: scale(1.3); }
        .save-btn { background: #1db954; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }

        /* AYARLAR */
        #settings-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #1a1a1a; padding: 20px; border-radius: 15px; display: none; z-index: 2000; border: 1px solid #333; }
        .settings-input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 id="login-title">GÜVENLİ ERİŞİM</h2>
    <button class="fingerprint-btn" onclick="showPinPad()"></button>
    <p id="clock-login" style="margin-top: 20px; font-family: monospace;"></p>
</div>

<div id="pin-overlay">
    <div class="pin-display" id="pin-dots">----</div>
    <div class="pin-grid" id="numpad"></div>
    <button onclick="hidePinPad()" style="color:gray; background:none; border:none; margin-top:20px;">Vazgeç</button>
</div>

<div id="app-content">
    <div class="app-header">
        <h3 id="app-title">Mistik Ajanda</h3>
        <button onclick="toggleSettings()" style="background:none; border:none; font-size:20px; cursor:pointer;">⚙️</button>
    </div>
    <div id="days-list"></div>
</div>

<div id="settings-modal">
    <h3>⚙️ Ayarlar</h3>
    <label>Defterin Adı:</label>
    <input type="text" id="set-app-name" class="settings-input" placeholder="Örn: İlknur'un Bahçesi">
    <label>Yeni 4 Haneli PIN:</label>
    <input type="number" id="set-app-pin" class="settings-input" maxlength="4" placeholder="1234">
    <button onclick="saveSettings()" class="save-btn">AYARLARI KAYDET</button>
    <button onclick="toggleSettings()" style="background:none; border:none; color:red; width:100%; margin-top:10px;">Kapat</button>
</div>

<script>
    let correctPin = localStorage.getItem('app-pin') || "1234";
    let appName = localStorage.getItem('app-name') || "Mistik Ajanda";
    let currentInputPin = "";
    let selectedMood = "😊";

    document.getElementById('app-title').innerText = appName;
    document.getElementById('login-title').innerText = appName.toUpperCase();

    function showPinPad() { document.getElementById('pin-overlay').style.display = 'flex'; renderNumPad(); }
    function hidePinPad() { document.getElementById('pin-overlay').style.display = 'none'; currentInputPin = ""; }

    function renderNumPad() {
        const pad = document.getElementById('numpad'); pad.innerHTML = "";
        for (let i = 1; i <= 9; i++) pad.innerHTML += `<button class="pin-btn" onclick="pressKey('${i}')">${i}</button>`;
        pad.innerHTML += `<button class="pin-btn" onclick="currentInputPin=''">C</button>`;
        pad.innerHTML += `<button class="pin-btn" onclick="pressKey('0')">0</button>`;
        pad.innerHTML += `<button class="pin-btn" onclick="checkPin()">OK</button>`;
    }

    function pressKey(k) { if(currentInputPin.length < 4) { currentInputPin += k; document.getElementById('pin-dots').innerText = "*".repeat(currentInputPin.length); } }

    function checkPin() {
        if(currentInputPin === correctPin) {
            document.getElementById('pin-overlay').style.display = 'none';
            document.getElementById('login-screen').style.top = '-100%';
            document.getElementById('app-content').style.display = 'block';
        } else { alert("Hatalı PIN!"); currentInputPin = ""; document.getElementById('pin-dots').innerText = "----"; }
    }

    function toggleSettings() { 
        const m = document.getElementById('settings-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        const newName = document.getElementById('set-app-name').value;
        const newPin = document.getElementById('set-app-pin').value;
        if(newName) { localStorage.setItem('app-name', newName); appName = newName; }
        if(newPin && newPin.length === 4) { localStorage.setItem('app-pin', newPin); correctPin = newPin; }
        alert("Ayarlar güncellendi! Sayfa yenileniyor...");
        location.reload();
    }

    const gunler = [
        { id: 'mon', ad: 'PAZARTESİ', cls: 'pazartesi' }, { id: 'tue', ad: 'SALI', cls: 'sali' },
        { id: 'wed', ad: 'ÇARŞAMBA', cls: 'carsamba' }, { id: 'thu', ad: 'PERŞEMBE', cls: 'persembe' },
        { id: 'fri', ad: 'CUMA', cls: 'cuma' }, { id: 'sat', ad: 'CUMARTESİ', cls: 'cumartesi' },
        { id: 'sun', ad: 'PAZAR', cls: 'pazar' }
    ];

    gunler.forEach(g => {
        document.getElementById('days-list').innerHTML += `
            <div class="day-container">
                <div class="day-header" onclick="toggleDay('${g.id}')">${g.ad} <span>▼</span></div>
                <div id="${g.id}" class="day-content ${g.cls}">
                    <div class="mood-selector">
                        <span class="mood-btn" onclick="setMood(this,'😊')">😊</span>
                        <span class="mood-btn" onclick="setMood(this,'🌟')">🌟</span>
                        <span class="mood-btn" onclick="setMood(this,'🌙')">🌙</span>
                        <span class="mood-btn" onclick="setMood(this,'🍃')">🍃</span>
                        <span class="mood-btn" onclick="setMood(this,'🔥')">🔥</span>
                    </div>
                    <textarea id="t-${g.id}" placeholder="Notlarını buraya dök..."></textarea>
                    <button class="save-btn" onclick="saveNote('${g.id}')">MODU VE NOTU KAYDET</button>
                </div>
            </div>`;
        const s = localStorage.getItem('n-'+g.id); if(s) document.getElementById('t-'+g.id).value = s;
    });

    function setMood(el, mood) {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active'); selectedMood = mood;
    }

    function toggleDay(id) {
        const c = document.getElementById(id); const is = c.style.display === 'block';
        document.querySelectorAll('.day-content').forEach(d => d.style.display = 'none');
        c.style.display = is ? 'none' : 'block';
    }

    function saveNote(id) {
        const txt = document.getElementById('t-'+id);
        const log = `\n[${new Date().toLocaleString('tr-TR')} | Mod: ${selectedMood}]\n` + txt.value;
        localStorage.setItem('n-'+id, log); txt.value = log;
        alert("Notun ve modun sonsuza dek kaydedildi!");
    }

    setInterval(() => { document.getElementById('clock-login').innerText = new Date().toLocaleString('tr-TR'); }, 1000);
</script>
</body>
</html>
