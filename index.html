    <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistik Ajanda - Final</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'serif'; background: #000; color: white; overflow: hidden; }
        
        /* GİRİŞ EKRANI RİTMİ */
        #login-screen { 
            position: fixed; width: 100%; height: 100%; 
            background: url('1000093933.jpg') no-repeat center center; 
            background-size: cover; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .fingerprint-btn { 
            width: 130px; height: 130px; 
            background: url('1000093911.jpg') no-repeat center center; 
            background-size: contain; border: none; cursor: pointer; 
            border-radius: 50%; box-shadow: 0 0 25px #00d4ff; 
            animation: breathe 2.5s infinite ease-in-out; 
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; }
            50% { transform: scale(1.1); box-shadow: 0 0 45px #00d4ff; }
        }
        
        /* PIN PANELİ RİTMİ */
        #pin-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1100; 
            backdrop-filter: blur(20px); 
        }

        .pin-display { font-size: 38px; color: #00d4ff; margin-bottom: 25px; letter-spacing: 12px; text-shadow: 0 0 15px #00d4ff; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 75px); gap: 18px; }
        .pin-btn { 
            width: 75px; height: 75px; border-radius: 50%; 
            border: 1px solid rgba(0,212,255,0.3); background: rgba(255,255,255,0.03); 
            color: white; font-size: 22px; cursor: pointer; transition: 0.2s;
        }
        .pin-btn:active { background: #00d4ff; color: #000; transform: scale(0.9); }
        
        /* ANA İÇERİK */
        #app-content { display: none; padding: 15px; height: 100vh; overflow-y: auto; background: #050505; }
        .app-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
        }

        .day-container { margin-bottom: 12px; border-radius: 15px; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.3s; }
        .day-header { 
            padding: 18px; background: rgba(15,15,15,0.9); cursor: pointer; 
            display: flex; justify-content: space-between; font-weight: bold; font-size: 18px;
        }

        .day-content { display: none; padding: 20px; min-height: 450px; background-size: cover; background-position: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* GÜN RESİMLERİ */
        .pazartesi { background-image: url('1000093927.jpg'); }
        .sali { background-image: url('1000093922.jpg'); }
        .carsamba { background-image: url('1000093921.jpg'); }
        .persembe { background-image: url('1000093920.jpg'); }
        .cuma { background-image: url('1000093919.jpg'); }
        .cumartesi { background-image: url('1000093918.jpg'); }
        .pazar { background-image: url('1000093916.jpg'); }

        textarea { 
            width: 100%; height: 220px; background: rgba(0,0,0,0.75); color: #ddd; 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 15px; 
            box-sizing: border-box; resize: none; font-size: 16px; line-height: 1.5;
        }

        .mood-selector { margin: 15px 0; display: flex; gap: 15px; justify-content: center; }
        .mood-btn { font-size: 24px; cursor: pointer; opacity: 0.4; transition: 0.3s; filter: grayscale(1); }
        .mood-btn.active { opacity: 1; filter: grayscale(0); transform: scale(1.4); }

        .save-btn { 
            background: linear-gradient(135deg, #1db954, #1ed760); color: white; border: none; 
            padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 15px; 
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
        }

        /* AYARLAR MODAL */
        #settings-modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 88%; background: #121212; padding: 25px; border-radius: 20px; 
            display: none; z-index: 2000; border: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .settings-input { 
            width: 100%; padding: 12px; margin: 12px 0; background: #000; 
            border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 id="login-title">GÜVENLİ ERİŞİM</h2>
    <button class="fingerprint-btn" onclick="showPinPad()"></button>
    <p id="clock-login" style="margin-top: 25px; font-family: 'Courier New', monospace; font-size: 18px; letter-spacing: 2px;"></p>
</div>

<div id="pin-overlay">
    <div class="pin-display" id="pin-dots">----</div>
    <div class="pin-grid" id="numpad"></div>
    <button onclick="hidePinPad()" style="color:#666; background:none; border:none; margin-top:30px; font-size:16px;">Vazgeç</button>
</div>

<div id="app-content">
    <div class="app-header">
        <h3 id="app-title" style="margin:0; font-style: italic;">Mistik Ajanda</h3>
        <button onclick="toggleSettings()" style="background:none; border:none; font-size:24px; cursor:pointer; color:white;">⚙️</button>
    </div>
    <div id="days-list"></div>
</div>

<div id="settings-modal">
    <h3 style="margin-top:0;">⚙️ Uygulama Ayarları</h3>
    <label style="font-size:14px; color:#888;">Ajanda İsmi:</label>
    <input type="text" id="set-app-name" class="settings-input">
    <label style="font-size:14px; color:#888;">Yeni 4 Haneli PIN:</label>
    <input type="number" id="set-app-pin" class="settings-input" pattern="\d*">
    <button onclick="saveSettings()" class="save-btn">GÜNCELLE VE YENİLE</button>
    <button onclick="toggleSettings()" style="background:none; border:none; color:#ff4d4d; width:100%; margin-top:15px; font-weight:bold;">KAPAT</button>
</div>

<script>
    let correctPin = localStorage.getItem('app-pin') || "1234";
    let appName = localStorage.getItem('app-name') || "Mistik Ajanda";
    let currentInputPin = "";
    let selectedMood = "😊";

    // Başlangıç Ayarları
    document.getElementById('app-title').innerText = appName;
    document.getElementById('login-title').innerText = appName.toUpperCase();
    document.getElementById('set-app-name').value = appName;

    function showPinPad() { document.getElementById('pin-overlay').style.display = 'flex'; renderNumPad(); }
    function hidePinPad() { document.getElementById('pin-overlay').style.display = 'none'; currentInputPin = ""; document.getElementById('pin-dots').innerText = "----"; }

    function renderNumPad() {
        const pad = document.getElementById('numpad'); pad.innerHTML = "";
        for (let i = 1; i <= 9; i++) pad.innerHTML += `<button class="pin-btn" onclick="pressKey('${i}')">${i}</button>`;
        pad.innerHTML += `<button class="pin-btn" style="color:#ff4d4d" onclick="currentInputPin=''">C</button>`;
        pad.innerHTML += `<button class="pin-btn" onclick="pressKey('0')">0</button>`;
        pad.innerHTML += `<button class="pin-btn" style="color:#1db954" onclick="checkPin()">OK</button>`;
    }

    function pressKey(k) { 
        if(currentInputPin.length < 4) { 
            currentInputPin += k; 
            document.getElementById('pin-dots').innerText = "*".repeat(currentInputPin.length) + "-".repeat(4 - currentInputPin.length); 
        } 
    }

    function checkPin() {
        if(currentInputPin === correctPin) {
            document.getElementById('pin-overlay').style.display = 'none';
            document.getElementById('login-screen').style.transform = 'translateY(-100%)';
