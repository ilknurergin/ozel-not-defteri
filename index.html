        <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistik Ajanda - Akıllı Hafıza</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Georgia', serif;
            background: #000; color: white;
            overflow-x: hidden;
        }

        /* GİRİŞ EKRANI */
        #login-screen {
            position: fixed; width: 100%; height: 100%;
            background: url('1000093933.jpg') no-repeat center center;
            background-size: cover;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; transition: 1s;
        }

        .fingerprint-btn {
            width: 150px; height: 150px;
            background: url('1000093911.jpg') no-repeat center center;
            background-size: contain;
            border: none; cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 20px #00d4ff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; }
            50% { transform: scale(1.05); box-shadow: 0 0 40px #00d4ff; }
            100% { transform: scale(1); box-shadow: 0 0 20px #00d4ff; }
        }

        /* ANA İÇERİK */
        #app-content {
            display: none; padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center; margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .day-container { margin-bottom: 10px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }

        .day-header {
            padding: 20px; font-size: 22px; font-weight: bold;
            cursor: pointer; text-align: left; background: rgba(0,0,0,0.6);
            display: flex; justify-content: space-between; align-items: center;
        }

        .day-content {
            display: none; padding: 20px; min-height: 400px;
            background-size: cover; background-position: center;
        }

        /* GÜN ARKA PLANLARI */
        .pazartesi { background-image: url('1000093927.jpg'); }
        .sali { background-image: url('1000093922.jpg'); }
        .carsamba { background-image: url('1000093921.jpg'); }
        .persembe { background-image: url('1000093920.jpg'); }
        .cuma { background-image: url('1000093919.jpg'); }
        .cumartesi { background-image: url('1000093918.jpg'); }
        .pazar { background-image: url('1000093916.jpg'); }

        textarea {
            width: 100%; height: 250px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); color: white;
            border-radius: 10px; padding: 15px;
            font-size: 16px; outline: none; box-sizing: border-box;
            resize: none;
        }

        .save-btn {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white; border: none;
            padding: 12px; border-radius: 8px; margin-top: 10px;
            cursor: pointer; font-weight: bold; width: 100%;
            transition: 0.3s;
        }
        
        .save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="margin-bottom: 50px; text-shadow: 2px 2px 10px #000;">GÜVENLİ ERİŞİM</h1>
    <button class="fingerprint-btn" onclick="login()"></button>
    <p style="margin-top: 20px;">LÜTFEN DOĞRULAMA YAPIN</p>
</div>

<div id="app-content">
    <div class="header">
        <h2 id="clock"></h2>
    </div>

    <div id="days-list"></div>
</div>

<script>
    const gunler = [
        { id: 'mon', ad: 'PAZARTESİ', sinif: 'pazartesi' },
        { id: 'tue', ad: 'SALI', sinif: 'sali' },
        { id: 'wed', ad: 'ÇARŞAMBA', sinif: 'carsamba' },
        { id: 'thu', ad: 'PERŞEMBE', sinif: 'persembe' },
        { id: 'fri', ad: 'CUMA', sinif: 'cuma' },
        { id: 'sat', ad: 'CUMARTESİ', sinif: 'cumartesi' },
        { id: 'sun', ad: 'PAZAR', sinif: 'pazar' }
    ];

    // Sayfa yüklendiğinde günleri oluştur
    const daysList = document.getElementById('days-list');
    gunler.forEach(gun => {
        daysList.innerHTML += `
            <div class="day-container">
                <div class="day-header" onclick="toggleDay('${gun.id}')">${gun.ad} <span>+</span></div>
                <div id="${gun.id}" class="day-content ${gun.sinif}">
                    <textarea id="text-${gun.id}" placeholder="Buraya notlarınızı yazın..."></textarea>
                    <button class="save-btn" onclick="saveNote('${gun.id}')">NOTU TARİHLE VE KAYDET</button>
                </div>
            </div>
        `;
        // Kayıtlı veriyi geri yükle
        setTimeout(() => {
            const saved = localStorage.getItem('note-' + gun.id);
            if(saved) document.getElementById('text-' + gun.id).value = saved;
        }, 100);
    });

    function login() {
        document.getElementById('login-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }, 800);
    }

    function toggleDay(id) {
        const content = document.getElementById(id);
        const isVisible = content.style.display === "block";
        document.querySelectorAll('.day-content').forEach(c => c.style.display = 'none');
        content.style.display = isVisible ? "none" : "block";
    }

    function saveNote(id) {
        const textArea = document.getElementById('text-' + id);
        const simdi = new Date();
        const tarihDamgasi = `\n--- [Kayıt: ${simdi.toLocaleString('tr-TR')}] ---\n`;
        
        // Eğer boş değilse tarih ekle ve kaydet
        if(textArea.value.trim() !== "") {
            const yeniNot = tarihDamgasi + textArea.value;
            localStorage.setItem('note-' + id, yeniNot);
            textArea.value = yeniNot;
            alert('Notunuz tarihlenerek güvenle kaydedildi!');
        }
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleString('tr-TR');
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
