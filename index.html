<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistik Ajanda</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: serif; }
        
        /* GİRİŞ EKRANI */
        #login-screen { 
            position: fixed; width: 100%; height: 100%; 
            background: url('0177b904c247bc8010066256a918128a.jpg') no-repeat center center; 
            background-size: cover; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            transition: 1s;
        }

        .fingerprint-btn { 
            width: 150px; height: 150px; 
            background: url('834a9255f00a5f8afa18cc371ea69afc.jpg') no-repeat center center; 
            background-size: contain; border: none; cursor: pointer; 
            border-radius: 50%; box-shadow: 0 0 40px #00d4ff; 
            animation: breathe 3s infinite; 
        }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        
        #pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1100; backdrop-filter: blur(15px); }
        .pin-display { font-size: 40px; color: #00d4ff; margin-bottom: 20px; letter-spacing: 10px; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
        .pin-btn { width: 80px; height: 80px; border-radius: 50%; border: 1px solid #333; background: rgba(255,255,255,0.05); color: white; font-size: 24px; cursor: pointer; }

        /* ANA İÇERİK - VİDEODAKİ GİBİ HER GÜN AÇIK */
        #app-content { display: none; padding: 0; background: #000; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        
        .day-box { width: 100%; border-bottom: 2px solid #111; }
        .day-header { 
            padding: 30px 20px; font-size: 26px; font-weight: bold;
            text-shadow: 2px 2px 5px #000; background: rgba(0,0,0,0.4); 
        }

        .day-body { padding: 20px; min-height: 550px; background-size: cover; background-position: center; display: block; }
        
        /* GÜN RESİMLERİ */
        .mon { background-image: url('2352ce77641b4da8769d51efff3eb20b.jpg'); }
        .tue { background-image: url('3e23d34ff1d420bbd75592b8f34ccc27.jpg'); }
        .wed { background-image: url('4bdf2e14ce8a8f4762846b8c8e4e092d.jpg'); }
        .thu { background-image: url('8c5f169f0a238e343023d5e81fda4033.jpg'); }
        .fri { background-image: url('ae46bebae07e389824249334233b4c7.jpg'); }
        .sat { background-image: url('fedce3e05611fae9c24bc6e90411b05d.jpg'); }
        .sun { background-image: url('0177b904c247bc8010066256a918128a.jpg'); }

        textarea { 
            width: 100%; height: 350px; background: rgba(0,0,0,0.8); color: #fff; 
            border: 1px solid #00d4ff; border-radius: 10px; padding: 20px; 
            font-size: 18px; box-sizing: border-box; resize: none;
        }

        .save-btn { 
            background: #00d4ff; color: #000; border: none; padding: 18px; 
            border-radius: 10px; width: 100%; font-weight: bold; 
            font-size: 18px; margin-top: 15px; cursor: pointer;
        }

        #settings-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: #111; padding: 20px; display: none; z-index: 2000; border: 1px solid #00d4ff; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 id="login-title">MİSTİK AJANDA</h1>
    <button class="fingerprint-btn" onclick="showPin()"></button>
    <p id="clock" style="margin-top:20px; font-family:monospace; font-size:22px; color:#00d4ff;"></p>
</div>

<div id="pin-overlay">
    <div class="pin-display" id="pin-dots">----</div>
    <div class="pin-grid" id="numpad"></div>
    <button onclick="hidePin()" style="margin-top:20px; color: white; background:none; border:none; cursor:pointer;">İPTAL</button>
</div>

<div id="app-content">
    <div class="header">
        <h2 id="app-title">Phantom Harmony</h2>
        <button onclick="toggleSettings()" style="background:none; border:none; font-size:28px; cursor:pointer;">⚙️</button>
    </div>
    <div id="days-list"></div>
</div>

<div id="settings-modal">
    <h3>⚙️ Ayarlar</h3>
    <input type="text" id="set-title" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Başlık Değiştir">
    <input type="number" id="set-pin" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Yeni PIN">
    <button onclick="saveSettings()" class="save-btn">GÜNCELLE</button>
</div>

<script>
    let correctPin = localStorage.getItem('m-pin') || "1234";
    let appTitle = localStorage.getItem('m-title') || "Phantom Harmony";
    let inputPin = "";

    document.getElementById('app-title').innerText = appTitle;
    document.getElementById('login-title').innerText = appTitle.toUpperCase();

    function showPin() { document.getElementById('pin-overlay').style.display = 'flex'; renderPad(); }
    function hidePin() { document.getElementById('pin-overlay').style.display = 'none'; inputPin = ""; document.getElementById('pin-dots').innerText = "----"; }

    function renderPad() {
        const d = document.getElementById('numpad'); d.innerHTML = "";
        for(let i=1; i<=9; i++) d.innerHTML += `<button class="pin-btn" onclick="add('${i}')">${i}</button>`;
        d.innerHTML += `<button class="pin-btn" onclick="inputPin=''">C</button>`;
        d.innerHTML += `<button class="pin-btn" onclick="add('0')">0</button>`;
        d.innerHTML += `<button class="pin-btn" onclick="confirm()">OK</button>`;
    }

    function add(n) { if(inputPin.length < 4) { inputPin += n; document.getElementById('pin-dots').innerText = "*".repeat(inputPin.length); } }

    function confirm() {
        if(inputPin === correctPin) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            hidePin();
        } else { alert("Hatalı PIN!"); inputPin = ""; document.getElementById('pin-dots').innerText = "----"; }
    }

    function toggleSettings() { const s = document.getElementById('settings-modal'); s.style.display = (s.style.display === 'block') ? 'none' : 'block'; }
    function saveSettings() {
        const t = document.getElementById('set-title').value;
        const p = document.getElementById('set-pin').value;
        if(t) localStorage.setItem('m-title', t);
        if(p && p.length === 4) localStorage.setItem('m-pin', p);
        location.reload();
    }

    const gunler = [
        { id: 'pzt', n: 'PAZARTESİ', c: 'mon' }, { id: 'sal', n: 'SALI', c: 'tue' },
        { id: 'car', n: 'ÇARŞAMBA', c: 'wed' }, { id: 'per', n: 'PERŞEMBE', c: 'thu' },
        { id: 'cum', n: 'CUMA', c: 'fri' }, { id: 'cmt', n: 'CUMARTESİ', c: 'sat' },
        { id: 'paz', n: 'PAZAR', c: 'sun' }
    ];

    gunler.forEach(g => {
        document.getElementById('days-list').innerHTML += `
            <div class="day-box">
                <div class="day-header">${g.n}</div>
                <div id="${g.id}" class="day-body ${g.c}">
                    <textarea id="txt-${g.id}" placeholder="Ruhunun notlarını mühürle..."></textarea>
                    <button class="save-btn" onclick="saveData('${g.id}')">NOTU & KONUMU MÜHÜRLE</button>
                </div>
            </div>`;
        const old = localStorage.getItem('diary-'+g.id);
        if(old) document.getElementById('txt-'+g.id).value = old;
    });

    // --- AKILLI LOKASYON ---
    async function saveData(id) {
        const val = document.getElementById('txt-'+id).value;
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
                    const data = await res.json();
                    const city = data.address.city || data.address.town || data.address.village || "Gizli Bölge";
                    const finalNote = val + `\n\n📍 ${city} | ⏰ ${new Date().toLocaleTimeString('tr-TR')}`;
                    localStorage.setItem('diary-'+id, finalNote);
                    document.getElementById('txt-'+id).value = finalNote;
                    alert("Notun ve konumun ( " + city + " ) mühürlendi! ✨");
                } catch (e) {
                    localStorage.setItem('diary-'+id, val);
                    alert("Mühürlendi.");
                }
            }, () => {
                localStorage.setItem('diary-'+id, val);
                alert("Mühürlendi.");
            });
        }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
</script>
</body>
</html>
